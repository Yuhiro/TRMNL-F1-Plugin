name: TRMNL F1 Update

on:
  schedule:
    - cron: '0 12 * * 1'       # Mon: once at noon UTC (post-race standings update)
    - cron: '*/15 * * * 5,6,0' # Fri–Sun: every 15 min (race weekend)
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch, build, and push to TRMNL
        env:
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
          USER_TIMEZONE: ${{ secrets.USER_TIMEZONE }}
        shell: bash
        run: set -o pipefail && node scripts/fetch-data.js | node scripts/build-payload.js | node scripts/push-webhook.js
