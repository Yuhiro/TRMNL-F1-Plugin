name: TRMNL F1 Update

on:
  schedule:
    - cron: '0 12 * * 1'       # Mon: once at noon UTC (post-race standings update)
    - cron: '0 12 * * 3'       # Wed: once at noon UTC (pick up penalty/DSQ point adjustments)
    - cron: '*/30 * * * 5,6,0' # Fri–Sun: every 30 min (weekend)
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch, build, and push to TRMNL
        env:
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
          USER_TIMEZONE: ${{ vars.USER_TIMEZONE }}
          # CIRCUIT_IMAGE_SOURCE: set to 'official' in repo Variables to use F1 CDN images.
          # Leave unset (or set to 'openf1') to use OpenF1 images (default).
          CIRCUIT_IMAGE_SOURCE: ${{ vars.CIRCUIT_IMAGE_SOURCE || 'openf1' }}
        shell: bash
        run: set -o pipefail && node scripts/fetch-data.js | node scripts/build-payload.js | node scripts/push-webhook.js
