name: TRMNL F1 Update

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch, build, and push to TRMNL
        env:
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
          USER_TIMEZONE: ${{ secrets.USER_TIMEZONE }}
        run: node scripts/fetch-data.js | node scripts/build-payload.js | node scripts/push-webhook.js
