name: TRMNL F1 Update

on:
  schedule:
    - cron: '0 12 * * 1'       # Mon: once at noon UTC (post-race standings update)
    - cron: '0 12 * * 3'       # Wed: once at noon UTC (pick up penalty/DSQ point adjustments)
    - cron: '*/30 * * * 5,6,0' # Fri–Sun: every 30 min (weekend)
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore last fetch cache
        uses: actions/cache@v4
        with:
          path: /tmp/last-fetch.json
          key: last-fetch-${{ github.run_id }}
          restore-keys: |
            last-fetch-

      - name: Fetch, build, and push to TRMNL
        env:
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
          USER_TIMEZONE: ${{ vars.USER_TIMEZONE }}
          # CIRCUIT_IMAGE_SOURCE: set to 'official' in repo Variables to use F1 CDN images.
          # Leave unset (or set to 'openf1') to use OpenF1 images (default).
          CIRCUIT_IMAGE_SOURCE: ${{ vars.CIRCUIT_IMAGE_SOURCE || 'openf1' }}
          # Testing variables — remove from repo Variables when done.
          # FORCE_SEASON: forces a specific season year (e.g. 2025) to trigger the off_season view.
          # MAX_STANDINGS_DRIVERS: caps the driver rows in the off_season standings table.
          FORCE_SEASON: ${{ vars.FORCE_SEASON }}
          MAX_STANDINGS_DRIVERS: ${{ vars.MAX_STANDINGS_DRIVERS }}
          LAST_FETCH_CACHE: /tmp/last-fetch.json
        shell: bash
        run: |
          set -eo pipefail
          node scripts/fetch-data.js > /tmp/new-fetch.json
          if [ -s /tmp/new-fetch.json ]; then
            cp /tmp/new-fetch.json /tmp/last-fetch.json
            cat /tmp/new-fetch.json | node scripts/build-payload.js | node scripts/push-webhook.js
          else
            echo "fetch-data.js produced no output — skipping push"
          fi
